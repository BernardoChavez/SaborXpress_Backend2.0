# Blueprint Render: https://render.com/docs/blueprint-spec
# Tras conectar el repo, Render puede crear el servicio desde este archivo.
services:
  - type: web
    name: saborxpress-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      # Configura en el panel de Render (no subas secretos al repo):
      # APP_KEY, APP_URL, DB_*, CORS_ALLOWED_ORIGINS, FRONTEND_URL
